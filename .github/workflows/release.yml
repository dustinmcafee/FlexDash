name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ -f "${{ steps.sign_apk.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" "FlexDash-${TAG}.apk"
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk "FlexDash-${TAG}.apk"
          fi
          echo "APK_PATH=FlexDash-${TAG}.apk" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FlexDash ${{ env.TAG }}"
          body: |
            ## FlexDash ${{ env.TAG }}

            ### What's included
            - VPN-aware dashboard for the flex server
            - Auto-detects VPN connection (routes to 10.8.0.6) or LAN (192.168.1.175)
            - Quick-launch Chrome Custom Tabs for Jellyfin, Radarr, Sonarr, qBittorrent, and Prowlarr

            ### Install
            Download `FlexDash-${{ env.TAG }}.apk` and sideload on Android.
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
