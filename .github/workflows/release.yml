name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build release APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/debug/app-debug.apk "FlexDash-${TAG}.apk"
          echo "APK_NAME=FlexDash-${TAG}.apk" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FlexDash ${{ env.TAG }}"
          body: |
            ## FlexDash ${{ env.TAG }}

            ### What's included
            - VPN-aware dashboard for the flex server
            - Auto-detects VPN connection (routes to 10.8.0.6) or LAN (192.168.1.175)
            - Quick-launch Chrome Custom Tabs for Jellyfin, Radarr, Sonarr, qBittorrent, and Prowlarr

            ### Install
            Download `${{ env.APK_NAME }}` below and sideload on Android.
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
